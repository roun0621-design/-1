<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3PRW9G7KVQ"></script>

  window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
    <meta name="theme-color" content="#b79f58">
    <title>PACE RISE : Node — 결과확인</title>
    <link rel="stylesheet" href="styles.css?v=72">
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <h1 class="header-title">PACE RISE <span class="header-colon">:</span> <span class="header-scope">Node</span></h1>
            <p class="header-subtitle">Sport Competition Operation Platform for Excellence</p>
        </div>
        <nav class="page-nav" id="page-nav"></nav>
    </header>

    <main class="main-content">
        <div class="page-title-bar">
            <a href="/dashboard.html" class="back-link">&larr; 대시보드</a>
            <h2>결과확인 <span class="page-sub">Results</span></h2>
        </div>

        <!-- Single-line competition info -->
        <div class="comp-info-line" id="comp-info-bar" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--gray-light);border-radius:6px;font-size:13px;margin-bottom:16px;flex-wrap:wrap;">
        </div>

        <!-- Phase C: 신기록 배너 (승인된 최근 NR/DR/CR) — 데이터 없으면 숨김 -->
        <div id="record-breaks-banner" style="display:none;margin-bottom:16px;"></div>

        <!-- Side-by-side Results Matrix (No gender tabs) -->
        <div id="results-matrix-container"></div>

        <!-- 종합기록지 기능 삭제됨 -->

        <!-- Detail overlay for viewing specific result -->
        <div id="result-detail-overlay" class="result-detail-overlay" style="display:none;">
            <div class="result-detail-modal">
                <div class="result-detail-header">
                    <h3 id="result-detail-title"></h3>
                    <button class="btn btn-ghost btn-sm" onclick="closeResultDetail()">✕ 닫기</button>
                </div>
                <div id="result-detail-content" class="result-detail-content">
                    <div id="results-content" class="results-content">
                        <div id="results-header-area" class="results-header-area"></div>
                        <table class="data-table" id="results-table">
                            <thead id="results-thead"></thead>
                            <tbody id="results-tbody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="result-detail-footer">
                    <div id="all-groups-download-area" class="all-groups-download" style="display:none;">
                        <span style="font-size:11px;font-weight:600;color:#6b7280;margin-right:8px;">전체 조:</span>
                        <button class="btn btn-outline btn-sm" onclick="downloadAllGroups('excel')">전체 Excel</button>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-outline" onclick="exportExcel()" title="현재 결과를 Excel 파일로 저장">📊 Excel</button>
                        <button class="btn btn-outline" onclick="exportPNG()" title="현재 결과를 이미지로 저장 (카톡 공유용)">🖼️ 이미지</button>
                        <button class="btn btn-outline" onclick="exportPDF()" title="현재 결과를 PDF로 인쇄/저장">🖨️ 인쇄</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <details><summary>Audit Log</summary><div id="audit-log-container"></div></details>
    </footer>

    <script src="/lib/xlsx.full.min.js"></script>
    <script src="/lib/html2canvas-pro.min.js"></script>
    <script src="common.js?v=74"></script>
    <script src="results.js?v=74"></script>
</body>
</html>
