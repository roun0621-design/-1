<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — PACE RISE</title>
    <meta name="description" content="PACE RISE 운영진/관리자 로그인">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
    <meta name="theme-color" content="#b79f58">
    <link rel="stylesheet" href="styles.css?v=72">
    <link rel="stylesheet" href="/lib/responsive.css?v=1">
    <style>
        :root {
            --brand-gold: #b79f58;
            --brand-dark: #1a1f2b;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(ellipse 800px 600px at 20% 0%, rgba(183,159,88,0.08), transparent),
                radial-gradient(ellipse 600px 500px at 100% 100%, rgba(26,31,43,0.06), transparent),
                #f7f5f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
        }
        .login-wrap { width: 100%; max-width: 440px; }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(26,31,43,0.08);
            padding: 32px 30px 26px;
            border: 1px solid rgba(183,159,88,0.18);
        }
        .login-header { text-align: center; margin-bottom: 22px; }
        .login-header .brand {
            font-family: var(--font-brand, 'Audiowide', sans-serif);
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--brand-dark);
            margin-bottom: 4px;
        }
        .login-header .brand .accent { color: var(--brand-gold); }
        .login-header .sub { font-size: 13px; color: #7a7066; letter-spacing: 1px; }

        /* Mode tabs */
        .mode-tabs {
            display: flex;
            background: #f0eee5;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
            gap: 4px;
        }
        .mode-tab {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            color: #7a7066;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            min-height: 40px;
        }
        .mode-tab.active {
            background: #fff;
            color: var(--brand-dark);
            box-shadow: 0 2px 6px rgba(26,31,43,0.08);
        }
        .mode-tab .badge-new {
            display: inline-block;
            font-size: 9px;
            background: var(--brand-gold);
            color: #fff;
            padding: 1px 5px;
            border-radius: 6px;
            margin-left: 4px;
            letter-spacing: 0.5px;
            vertical-align: 1px;
        }

        .panel { display: none; flex-direction: column; gap: 13px; }
        .panel.active { display: flex; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 13px; font-weight: 600; color: #4a4035; }
        .field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0d8c8;
            border-radius: 10px;
            font-size: 16px; /* iOS no-zoom */
            background: #fafaf7;
            transition: border-color .15s, background .15s;
            box-sizing: border-box;
        }
        .field input:focus {
            outline: none;
            border-color: var(--brand-gold);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(183,159,88,0.15);
        }
        .field input::placeholder { color: #b8aea0; }

        .btn-login {
            margin-top: 6px;
            width: 100%;
            padding: 13px 20px;
            background: linear-gradient(135deg, var(--brand-dark) 0%, #2a3340 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform .1s, box-shadow .15s, opacity .15s;
            min-height: 48px;
        }
        .btn-login:hover { box-shadow: 0 4px 14px rgba(26,31,43,0.25); }
        .btn-login:active { transform: translateY(1px); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .msg {
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
        }
        .msg.error   { display: block; background: #fff2f0; color: #c0392b; border: 1px solid #f5cdc6; }
        .msg.success { display: block; background: #f0f9ed; color: #2d7a2d; border: 1px solid #c6e3b8; }
        .msg.info    { display: block; background: #fdf8e8; color: #7a6400; border: 1px solid #ebd896; }

        .help-text {
            font-size: 11.5px;
            color: #8a7e6f;
            line-height: 1.6;
            padding: 8px 10px;
            background: rgba(183,159,88,0.06);
            border-radius: 6px;
            border-left: 3px solid var(--brand-gold);
        }
        .help-text strong { color: #4a4035; }

        .login-footer {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px dashed #e0d8c8;
            text-align: center;
            font-size: 12px;
            color: #8a7e6f;
            line-height: 1.7;
        }
        .login-footer a { color: var(--brand-gold); text-decoration: none; font-weight: 600; }
        .login-footer a:hover { text-decoration: underline; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-right: 6px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: -2px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-card { padding: 26px 20px 22px; }
            .login-header .brand { font-size: 24px; }
            .mode-tab { font-size: 12px; padding: 9px 8px; }
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-header">
                <div class="brand">PACE <span class="accent">RISE</span></div>
                <div class="sub">로그인</div>
            </div>

            <!-- 모드 탭: 관리자 (JWT) ↔ 운영진/심판 (legacy) -->
            <div class="mode-tabs" role="tablist">
                <button class="mode-tab active" data-mode="jwt" id="tab-jwt" type="button">
                    관리자·매니저
                    <span class="badge-new">NEW</span>
                </button>
                <button class="mode-tab" data-mode="legacy" id="tab-legacy" type="button">
                    운영진·심판
                </button>
            </div>

            <!-- 메시지 -->
            <div class="msg" id="msg"></div>

            <!-- JWT 패널 (관리자/매니저) -->
            <form class="panel active" id="panel-jwt" onsubmit="return false;" autocomplete="on">
                <div class="field">
                    <label for="jwt-username">아이디</label>
                    <input
                        type="text"
                        id="jwt-username"
                        name="username"
                        autocomplete="username"
                        placeholder="아이디 입력"
                        autocapitalize="off"
                        autocorrect="off"
                        spellcheck="false">
                </div>
                <div class="field">
                    <label for="jwt-password">비밀번호</label>
                    <input
                        type="password"
                        id="jwt-password"
                        name="password"
                        autocomplete="current-password"
                        placeholder="비밀번호 입력">
                </div>
                <button type="submit" class="btn-login" id="btn-jwt-login">로그인</button>
                <div class="help-text">
                    <strong>관리자가 발급한 계정</strong>을 사용하세요.<br>
                    계정이 없으면 대회 운영 관리자에게 문의하세요.
                </div>
            </form>

            <!-- Legacy 패널 (심판/운영) -->
            <form class="panel" id="panel-legacy" onsubmit="return false;" autocomplete="off">
                <div class="field">
                    <label for="legacy-name">심판명 또는 운영 ID</label>
                    <input
                        type="text"
                        id="legacy-name"
                        autocomplete="off"
                        placeholder="홍길동 또는 admin"
                        autocapitalize="off"
                        autocorrect="off"
                        spellcheck="false">
                </div>
                <div class="field">
                    <label for="legacy-key">운영 키 또는 비밀번호</label>
                    <input
                        type="password"
                        id="legacy-key"
                        autocomplete="off"
                        placeholder="키 입력">
                </div>
                <button type="submit" class="btn-login" id="btn-legacy-login">로그인</button>
                <div class="help-text">
                    심판/운영진은 대회 운영자가 알려준 <strong>심판명 + 운영 키</strong>를 입력하세요.
                </div>
            </form>

            <div class="login-footer">
                일반 관람자는 로그인 없이 대회를 선택해<br>
                실시간 결과를 확인할 수 있습니다.<br>
                <a href="/" style="margin-top:8px; display:inline-block;">← 메인으로 돌아가기</a>
            </div>
        </div>
    </div>

    <script src="/lib/auth-client.js"></script>
    <script>
        const $ = (id) => document.getElementById(id);
        const $msg = $('msg');

        function showMsg(type, text) {
            $msg.className = 'msg ' + type;
            $msg.textContent = text;
        }
        function clearMsg() {
            $msg.className = 'msg';
            $msg.textContent = '';
        }

        // ─────────── 모드 탭 ───────────
        function switchMode(mode) {
            clearMsg();
            document.querySelectorAll('.mode-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.mode === mode);
            });
            $('panel-jwt').classList.toggle('active', mode === 'jwt');
            $('panel-legacy').classList.toggle('active', mode === 'legacy');
            // 마지막 사용 모드 기억
            try { localStorage.setItem('pace_last_login_mode', mode); } catch(e) {}
            // 첫 필드 포커스
            setTimeout(() => {
                if (mode === 'jwt') {
                    if (!$('jwt-username').value) $('jwt-username').focus();
                    else $('jwt-password').focus();
                } else {
                    if (!$('legacy-name').value) $('legacy-name').focus();
                    else $('legacy-key').focus();
                }
            }, 30);
        }
        document.querySelectorAll('.mode-tab').forEach(t => {
            t.addEventListener('click', () => switchMode(t.dataset.mode));
        });

        // ─────────── JWT 로그인 ───────────
        async function doJwtLogin(ev) {
            if (ev) ev.preventDefault();
            clearMsg();
            const username = $('jwt-username').value.trim();
            const password = $('jwt-password').value;
            if (!username || !password) {
                return showMsg('error', '아이디와 비밀번호를 입력하세요.');
            }
            const btn = $('btn-jwt-login');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>로그인 중...';
            try {
                const data = await PaceAuth.login(username, password);
                showMsg('success', `${data.user.display_name || data.user.username} 으로 로그인되었습니다. 이동합니다...`);
                redirectAfterLogin();
            } catch (e) {
                showMsg('error', e.message || '로그인 실패');
                btn.disabled = false;
                btn.innerHTML = '로그인';
                $('jwt-password').focus();
                $('jwt-password').select();
            }
        }
        $('panel-jwt').addEventListener('submit', doJwtLogin);

        // ─────────── Legacy 로그인 (심판명 + 키) ───────────
        async function doLegacyLogin(ev) {
            if (ev) ev.preventDefault();
            clearMsg();
            const judgeName = $('legacy-name').value.trim();
            const key = $('legacy-key').value.trim();
            if (!judgeName || !key) {
                return showMsg('error', '심판명/ID 와 키를 모두 입력하세요.');
            }
            const btn = $('btn-legacy-login');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>로그인 중...';
            try {
                const r = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ judge_name: judgeName, key })
                });
                if (!r.ok) {
                    const errText = await r.json().catch(() => ({}));
                    throw new Error(errText.error || '심판명 또는 키가 일치하지 않습니다.');
                }
                const data = await r.json();
                // legacy localStorage 키 저장
                localStorage.setItem('pace_admin_key', key);
                localStorage.setItem('pace_role', data.role);
                localStorage.setItem('pace_judge_name', data.judge_name || judgeName);
                showMsg('success', `${data.label || data.role} 으로 로그인되었습니다. 이동합니다...`);
                redirectAfterLogin();
            } catch (e) {
                showMsg('error', e.message || '로그인 실패');
                btn.disabled = false;
                btn.innerHTML = '로그인';
                $('legacy-key').focus();
                $('legacy-key').select();
            }
        }
        $('panel-legacy').addEventListener('submit', doLegacyLogin);

        // ─────────── 공통: 로그인 후 리다이렉트 ───────────
        function redirectAfterLogin() {
            const params = new URLSearchParams(location.search);
            let redirect = params.get('redirect') || '/';
            // 보안: 외부 URL 방지
            if (!redirect.startsWith('/') || redirect.startsWith('//')) redirect = '/';
            setTimeout(() => { location.href = redirect; }, 700);
        }

        // ─────────── 초기화 ───────────
        (function init() {
            // 이미 로그인 상태면 안내
            const legacyRole = localStorage.getItem('pace_role') || 'viewer';
            if (legacyRole !== 'viewer') {
                const judgeName = localStorage.getItem('pace_judge_name') || '';
                showMsg('info', `이미 ${legacyRole === 'admin' ? '관리자' : '운영'}(${judgeName}) 으로 로그인되어 있습니다. 다른 계정으로 로그인하려면 입력하세요.`);
            } else if (window.PaceAuth) {
                PaceAuth.me().then(u => {
                    if (u && u.id) {
                        showMsg('info', `이미 ${u.display_name || u.username} 으로 로그인되어 있습니다.`);
                    }
                }).catch(() => {});
            }

            // 마지막 사용 모드 복원
            let lastMode = 'jwt';
            try { lastMode = localStorage.getItem('pace_last_login_mode') || 'jwt'; } catch(e) {}
            if (lastMode !== 'jwt' && lastMode !== 'legacy') lastMode = 'jwt';
            switchMode(lastMode);

            // ?mode= 쿼리로 강제 지정 가능
            const params = new URLSearchParams(location.search);
            const forced = params.get('mode');
            if (forced === 'jwt' || forced === 'legacy') switchMode(forced);
        })();
    </script>
</body>
</html>
