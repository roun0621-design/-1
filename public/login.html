<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — PACE RISE</title>
    <meta name="description" content="PACE RISE 운영진/관리자 로그인">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
    <meta name="theme-color" content="#b79f58">
    <link rel="stylesheet" href="styles.css?v=72">
    <link rel="stylesheet" href="/lib/responsive.css?v=1">
    <style>
        :root {
            --brand-gold: #b79f58;
            --brand-dark: #1a1f2b;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(ellipse 800px 600px at 20% 0%, rgba(183,159,88,0.08), transparent),
                radial-gradient(ellipse 600px 500px at 100% 100%, rgba(26,31,43,0.06), transparent),
                #f7f5f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
        }
        .login-wrap {
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow:
                0 1px 2px rgba(0,0,0,0.04),
                0 8px 32px rgba(26,31,43,0.08);
            padding: 36px 32px 28px;
            border: 1px solid rgba(183,159,88,0.18);
        }
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-header .brand {
            font-family: var(--font-brand, 'Audiowide', sans-serif);
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--brand-dark);
            margin-bottom: 4px;
        }
        .login-header .brand .accent {
            color: var(--brand-gold);
        }
        .login-header .sub {
            font-size: 13px;
            color: #7a7066;
            letter-spacing: 1px;
        }
        .login-form { display: flex; flex-direction: column; gap: 14px; }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field label {
            font-size: 13px;
            font-weight: 600;
            color: #4a4035;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0d8c8;
            border-radius: 10px;
            font-size: 16px; /* iOS no-zoom */
            background: #fafaf7;
            transition: border-color .15s, background .15s;
            box-sizing: border-box;
        }
        .field input:focus {
            outline: none;
            border-color: var(--brand-gold);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(183,159,88,0.15);
        }
        .field input::placeholder { color: #b8aea0; }
        .btn-login {
            margin-top: 6px;
            width: 100%;
            padding: 13px 20px;
            background: linear-gradient(135deg, var(--brand-dark) 0%, #2a3340 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform .1s, box-shadow .15s, opacity .15s;
            min-height: 48px;
        }
        .btn-login:hover { box-shadow: 0 4px 14px rgba(26,31,43,0.25); }
        .btn-login:active { transform: translateY(1px); }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .msg {
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
        }
        .msg.error {
            display: block;
            background: #fff2f0;
            color: #c0392b;
            border: 1px solid #f5cdc6;
        }
        .msg.success {
            display: block;
            background: #f0f9ed;
            color: #2d7a2d;
            border: 1px solid #c6e3b8;
        }
        .msg.info {
            display: block;
            background: #fdf8e8;
            color: #7a6400;
            border: 1px solid #ebd896;
        }
        .login-footer {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px dashed #e0d8c8;
            text-align: center;
            font-size: 12px;
            color: #8a7e6f;
            line-height: 1.7;
        }
        .login-footer a {
            color: var(--brand-gold);
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover { text-decoration: underline; }
        .legacy-link {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 12px;
            background: rgba(183,159,88,0.08);
            border-radius: 6px;
            font-size: 11px;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-right: 6px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: -2px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-card { padding: 28px 22px 22px; }
            .login-header .brand { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-header">
                <div class="brand">PACE <span class="accent">RISE</span></div>
                <div class="sub">운영진 로그인</div>
            </div>

            <form class="login-form" id="loginForm" onsubmit="return false;" autocomplete="on">
                <div class="msg" id="msg"></div>

                <div class="field">
                    <label for="username">아이디</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        placeholder="admin"
                        autocapitalize="off"
                        autocorrect="off"
                        spellcheck="false"
                        required>
                </div>

                <div class="field">
                    <label for="password">비밀번호</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        placeholder="비밀번호 입력"
                        required>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    로그인
                </button>
            </form>

            <div class="login-footer">
                일반 관람자는 로그인 없이 대회를 선택해<br>
                실시간 결과를 확인할 수 있습니다.<br>
                <a href="/" style="margin-top:8px; display:inline-block;">← 메인으로 돌아가기</a>
                <br>
                <a href="/index.html?action=login" class="legacy-link">기존 심판/운영 로그인 (judge_name + key)</a>
            </div>
        </div>
    </div>

    <script src="/lib/auth-client.js"></script>
    <script>
        const $msg = document.getElementById('msg');
        const $btn = document.getElementById('btnLogin');
        const $username = document.getElementById('username');
        const $password = document.getElementById('password');
        const $form = document.getElementById('loginForm');

        function showMsg(type, text) {
            $msg.className = 'msg ' + type;
            $msg.textContent = text;
        }
        function clearMsg() {
            $msg.className = 'msg';
            $msg.textContent = '';
        }

        // 이미 로그인된 경우 안내
        (async function preflight() {
            try {
                const user = await PaceAuth.me();
                if (user && user.id) {
                    showMsg('info', `이미 ${user.display_name || user.username} 으로 로그인되어 있습니다.`);
                }
            } catch (e) { /* 무시 */ }
        })();

        async function doLogin(ev) {
            if (ev) ev.preventDefault();
            clearMsg();
            const username = $username.value.trim();
            const password = $password.value;
            if (!username || !password) {
                showMsg('error', '아이디와 비밀번호를 모두 입력해주세요.');
                return;
            }
            $btn.disabled = true;
            $btn.innerHTML = '<span class="spinner"></span>로그인 중...';
            try {
                const data = await PaceAuth.login(username, password);
                showMsg('success', `${data.user.display_name || data.user.username} 으로 로그인되었습니다. 이동합니다...`);
                // 리다이렉트 ?redirect= 우선
                const params = new URLSearchParams(location.search);
                const redirect = params.get('redirect') || '/';
                setTimeout(() => { location.href = redirect; }, 700);
            } catch (e) {
                showMsg('error', e.message || '로그인에 실패했습니다.');
                $btn.disabled = false;
                $btn.innerHTML = '로그인';
                // 비밀번호 필드 포커스 & 선택
                $password.focus();
                $password.select();
            }
        }

        $form.addEventListener('submit', doLogin);
        $btn.addEventListener('click', doLogin);

        // 초기 포커스
        window.addEventListener('load', () => {
            if (!$username.value) $username.focus();
            else $password.focus();
        });
    </script>
</body>
</html>
