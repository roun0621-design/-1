<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
    <meta name="theme-color" content="#03C75A">
    <title>PACE RISE : Node — 소집실</title>
    <link rel="stylesheet" href="styles.css?v=33">
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <h1 class="header-title">PACE RISE <span class="header-colon">:</span> <span class="header-scope">Node</span></h1>
            <p class="header-subtitle">Sport Competition Operation Platform for Excellence</p>
        </div>
        <nav class="page-nav" id="page-nav"></nav>
    </header>

    <main class="main-content">
        <div class="page-title-bar">
            <a href="/dashboard.html" class="back-link">&larr; 대시보드</a>
            <h2>소집실 <span class="page-sub">Call Room Dashboard</span></h2>
        </div>

        <!-- Single-line competition info -->
        <div class="comp-info-line" id="comp-info-bar" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg-dark);border-radius:6px;font-size:13px;margin-bottom:16px;flex-wrap:wrap;">
        </div>

        <!-- Dashboard layout: left matrix + right detail -->
        <div class="callroom-dashboard">
            <!-- LEFT: Event Matrix -->
            <div class="callroom-matrix-panel">
                <div class="gender-tabs-fixed">
                    <div class="gender-tabs" id="gender-tabs" style="margin-bottom:0;">
                        <button class="gender-tab active" data-gender="M">남자</button>
                        <button class="gender-tab" data-gender="F">여자</button>
                        <button class="gender-tab" data-gender="X">혼성</button>
                    </div>
                </div>
                <div class="matrix-scroll-area" id="callroom-matrix-container"></div>
            </div>

            <!-- RIGHT: Callroom detail area -->
            <div class="callroom-detail-panel" id="callroom-detail">
                <div class="detail-placeholder">
                    <div class="placeholder-icon">📋</div>
                    <p>왼쪽에서 종목을 선택하세요</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <details><summary>Audit Log</summary><div id="audit-log-container"></div></details>
    </footer>

    <script src="common.js?v=34"></script>
    <script src="callroom.js?v=33"></script>
</body>
</html>
